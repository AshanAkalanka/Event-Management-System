<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Golden Dish Caterings</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <header>
        <div class="container header-content">
            <div class="logo">
                <img src="/images/logo.png" alt="Logo">
                <span class="logo-text">Golden Dish Caterings</span>
            </div>
            <div class="nav-container">
                <nav>
                    <ul>
                        <li><a href="/customer/home">Home</a></li>
                        <li><a href="/customer/menu">Menu</a></li>
                        <li><a href="/customer/services">Services</a></li>
                        <li><a href="/customer/book-event">Book Event</a></li>
                        <li><a href="/customer/profile" class="user-email"><span class="active-dot"></span><span
                                    th:text="${userEmail}">User</span></a></li>
                        <li><a href="/logout" class="logout-btn">Logout</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <div class="container py-5" style="margin-top: 80px;">
        <h1 class="text-center mb-4">My Profile</h1>

        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="modern-card hover-lift h-100">
                    <div class="card-body p-4">
                        <h4 class="mb-4" style="color: var(--secondary);"><i class="fas fa-user mb-1"></i> Profile
                            Information</h4>
                        <form id="profile-form">
                            <div class="mb-3">
                                <label class="form-label text-muted">First Name</label>
                                <input type="text" class="form-control styled-input" id="firstName"
                                    th:value="${user.firstName}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted">Last Name</label>
                                <input type="text" class="form-control styled-input" id="lastName"
                                    th:value="${user.lastName}" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted">Email</label>
                                <input type="email" class="form-control styled-input" id="email"
                                    th:value="${user.email}" required>
                            </div>
                            <button type="submit" class="action-btn btn-primary rounded-pill w-100 mt-2">Update
                                Profile</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="modern-card hover-lift h-100">
                    <div class="card-body p-4">
                        <h4 class="mb-4" style="color: var(--secondary);"><i class="fas fa-lock mb-1"></i> Change
                            Password</h4>
                        <form id="password-form">
                            <div class="mb-3">
                                <label class="form-label text-muted">Current Password</label>
                                <input type="password" class="form-control styled-input" id="oldPassword" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted">New Password</label>
                                <input type="password" class="form-control styled-input" id="newPassword" required
                                    minlength="6">
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted">Confirm New Password</label>
                                <input type="password" class="form-control styled-input" id="confirmPassword" required
                                    minlength="6">
                            </div>
                            <button type="submit" class="action-btn btn-primary rounded-pill w-100 mt-2">Change
                                Password</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('profile-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const formData = new FormData();
            formData.append('firstName', document.getElementById('firstName').value);
            formData.append('lastName', document.getElementById('lastName').value);
            formData.append('email', document.getElementById('email').value);

            const response = await fetch('/customer/profile/update', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            alert(data.message);
            if (data.success) location.reload();
        });

        document.getElementById('password-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                alert('New passwords do not match');
                return;
            }

            const formData = new FormData();
            formData.append('oldPassword', document.getElementById('oldPassword').value);
            formData.append('newPassword', newPassword);

            const response = await fetch('/customer/profile/change-password', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            alert(data.message);
            if (data.success) {
                document.getElementById('password-form').reset();
            }
        });

        // Handle logout
        document.querySelectorAll('.logout-btn').forEach(btn => {
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                sessionStorage.clear();
                window.location.href = '/logout';
            });
        });
    </script>
</body>

</html>
