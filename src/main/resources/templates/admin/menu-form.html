<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${menu.id == null} ? 'Add Meal' : 'Edit Meal'">Meal Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <header>
        <div class="container header-content">
            <div class="logo">
                <img src="/images/logo.png" alt="Logo">
                <span class="logo-text">Golden Dish Caterings</span>
            </div>
            <div class="nav-container">
                <nav>
                    <ul>
                        <li><a href="/dashboard">Dashboard</a></li>
                        <li><a href="/admin/menus">Meals</a></li>
                        <li><a href="#" class="user-email"><span class="active-dot"></span><span
                                    th:text="${userEmail}">Admin</span></a></li>
                        <li><a href="/logout" class="logout-btn">Logout</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <div class="container py-5" style="margin-top: 80px; max-width: 900px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="mb-0" style="color: var(--secondary);" th:text="${menu.id == null} ? 'Add Meal' : 'Edit Meal'">
                Meal</h1>
            <a href="/admin/menus" class="action-btn btn-outline rounded-pill btn-sm"><i class="fas fa-arrow-left"></i>
                Back</a>
        </div>

        <form action="/admin/menus/save" method="post" enctype="multipart/form-data" class="modern-card hover-lift">
            <div class="card-body p-4">
                <input type="hidden" name="id" th:value="${menu.id}" />

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-muted">Name</label>
                        <input class="form-control styled-input" type="text" name="name" th:value="${menu.name}"
                            required />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-muted">Category</label>
                        <select class="form-control styled-select" name="category" required>
                            <option th:each="c : ${categories}" th:value="${c}" th:text="${c}"
                                th:selected="${menu.category == c}">CAT</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted">Description</label>
                    <textarea class="form-control styled-input" name="description" rows="3"
                        th:text="${menu.description}"></textarea>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label text-muted">Price</label>
                        <input class="form-control styled-input" type="number" step="0.01" min="0" name="price"
                            th:value="${menu.price}" required />
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label text-muted">Unit</label>
                        <input class="form-control styled-input" type="text" name="unit" th:value="${menu.unit}"
                            required />
                    </div>
                    <div class="col-md-4 mb-3 d-flex align-items-end">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="isAvailable" value="true"
                                th:checked="${menu.isAvailable}" id="isAvailable" />
                            <label class="form-check-label text-muted" for="isAvailable">Available</label>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted">Photo</label>
                    <input class="form-control styled-input" type="file" name="image" accept="image/*" />
                    <div class="mt-2" th:if="${menu.imageUrl != null and !menu.imageUrl.isEmpty()}">
                        <img th:src="${menu.imageUrl}" alt="Current" style="max-height: 160px; border-radius: 8px;" />
                    </div>
                </div>

                <button class="action-btn btn-primary rounded-pill mt-2" type="submit"><i class="fas fa-save"></i>
                    Save</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn');
            if (isLoggedIn !== 'true') {
                window.location.href = '/login';
            }
        });

        document.querySelectorAll('.logout-btn').forEach(btn => {
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                sessionStorage.clear();
                window.location.href = '/logout';
            });
        });
    </script>
</body>

</html>
