<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        /* Modern chat styles are now globally defined in styles.css */
    </style>
</head>

<body>
    <header>
        <div class="container header-content">
            <div class="logo">
                <img src="/images/logo.png" alt="Logo">
                <span class="logo-text">Golden Dish Caterings</span>
            </div>
            <div class="nav-container">
                <nav>
                    <ul>
                        <li><a href="/dashboard">Dashboard</a></li>
                        <li><a href="/admin/bookings">Bookings</a></li>
                        <li><a href="/admin/menus">Meals</a></li>
                        <li><a href="/admin/services">Services</a></li>
                        <li><a href="/admin/chat">Chat</a></li>
                        <li><a href="#" class="user-email"><span class="active-dot"></span><span
                                    th:text="${userEmail}">Admin</span></a></li>
                        <li><a href="/logout" class="logout-btn">Logout</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <div class="container py-5" style="margin-top: 80px; max-width: 1100px;">
        <div class="row g-4">
            <!-- Sidebar: Customer List -->
            <div class="col-md-4">
                <div class="customer-list-box">
                    <div class="customer-list-header">
                        <h4><i class="fas fa-users me-2"></i> Customers</h4>
                    </div>
                    <div class="styled-select-container">
                        <select id="customerSelect" class="styled-select">
                            <option value="">Select a customer...</option>
                            <option th:each="c : ${customers}" th:value="${c.id}" th:text="${c.email}">customer@email
                            </option>
                        </select>
                    </div>
                    <div class="customer-list-info">
                        <small><i class="fas fa-info-circle"></i> Only customers with message history appear
                            here.</small>
                    </div>
                </div>
            </div>

            <!-- Main Area: Chat Box -->
            <div class="col-md-8">
                <div class="chat-container-wrapper">
                    <div class="chat-header admin-header">
                        <h4><i class="fas fa-comments me-2"></i> Conversation</h4>
                        <div class="chat-status">
                            <span id="chatTargetEmail" style="opacity:0.9;">Select a customer</span>
                        </div>
                    </div>

                    <div id="chatBox" class="chat-box">
                        <div class="text-center text-muted mt-4">
                            <i class="fas fa-inbox fa-3x mb-3" style="opacity:0.2;"></i>
                            <p>Select a customer to view messages.</p>
                        </div>
                    </div>

                    <div class="chat-input-area border-top">
                        <form id="chatForm">
                            <input id="chatMessage" class="chat-input" type="text"
                                placeholder="Type your message to customer..." autocomplete="off" disabled />
                            <button id="sendBtn" class="chat-send-btn admin-btn" type="submit" title="Send message"
                                disabled><i class="fas fa-paper-plane"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/admin/chat.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn');
            if (isLoggedIn !== 'true') {
                window.location.href = '/login';
            }
        });

        document.querySelectorAll('.logout-btn').forEach(btn => {
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                sessionStorage.clear();
                window.location.href = '/logout';
            });
        });
    </script>
</body>

</html>
