<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Golden Dish Catering</title>
  <link rel="icon" type="image/png" href="/images/logo.png">

  <!-- Theme CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">

  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .hidden {
      display: none !important;
    }

    .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 20px 60px;
      /* Accounts for fixed header */
      background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
        url('https://images.unsplash.com/photo-1555244162-803834f70033?auto=format&fit=crop&w=1469&q=80') center/cover no-repeat;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 1.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .login-header h2 {
      color: var(--dark);
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .login-header p {
      color: var(--gray);
      font-size: 0.95rem;
    }

    .form-label {
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 0.5rem;
    }

    .form-control {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 1px solid #ced4da;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      border-color: #343a40;
      /* Darker focus for admin */
      box-shadow: 0 0 0 0.2rem rgba(52, 58, 64, 0.25);
    }

    .btn-login {
      width: 100%;
      padding: 10px;
      font-size: 0.9rem;
      border-radius: 50px;
      margin-top: 1rem;
      background-color: #343a40;
      /* Darker button for admin */
      color: white;
      border: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-login:hover {
      background-color: #212529;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      color: white;
    }

    .error-message {
      background: #ffebee;
      border: 1px solid #ffcdd2;
      color: #c62828;
      padding: 15px;
      border-radius: 8px;
      margin-top: 1.5rem;
      font-size: 0.95rem;
    }

    main {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .back-link {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #eee;
    }

    .back-link a {
      color: var(--gray);
      font-size: 0.9rem;
      text-decoration: none;
      transition: color 0.3s;
    }

    .back-link a:hover {
      color: var(--dark);
    }
  </style>
</head>

<body>

  <!-- Global Header -->
  <header>
    <div class="container header-content">
      <a href="/" class="logo" style="text-decoration: none;">
        <img src="/images/logo.png" alt="Logo">
        <span class="logo-text">Golden Dish Caterings</span>
      </a>
      <div class="nav-container">
        <nav>
          <ul>
            <li><a href="/">Home</a></li>
          </ul>
        </nav>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main>
    <section class="login-wrapper">
      <div class="login-card">
        <div class="login-header">
          <h2><i class="fas fa-user-shield me-2"></i>Admin Area</h2>
          <p>Secure login for administrators only</p>
        </div>

        <form id="admin-login-form" autocomplete="off">
          <div class="mb-3">
            <label for="email" class="form-label">
              <i class="fas fa-envelope text-secondary me-2"></i> Email Address
            </label>
            <input id="email" type="email" class="form-control" required placeholder="Enter admin email" />
          </div>

          <div class="mb-4">
            <label for="password" class="form-label">
              <i class="fas fa-lock text-secondary me-2"></i> Password
            </label>
            <input id="password" type="password" class="form-control" required placeholder="Enter password" />
          </div>

          <button id="login-btn" type="button" class="btn-login">
            <i class="fas fa-sign-in-alt me-2"></i> Login to Dashboard
          </button>
        </form>

        <div id="fail-box" class="error-message hidden">
          <strong><i class="fas fa-exclamation-circle me-1"></i> Authentication failed.</strong>
          <p id="fail-text" class="mb-0 mt-1">Please check your credentials.</p>
        </div>

        <div class="back-link">
          <a href="/login"><i class="fas fa-arrow-left me-1"></i> Back to Customer Login</a>
        </div>
      </div>
    </section>
  </main>

  <!-- Global Footer -->
  <footer>
    <div class="container">
      <div class="footer-bottom text-center pt-3 border-secondary">
        <p class="mb-0" style="font-size: 14px; color: rgba(255,255,255,0.7);">&copy; 2025 Golden Dish Caterers | Admin
          Portal</p>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const loginBtn = document.getElementById('login-btn');
      const failBox = document.getElementById('fail-box');

      loginBtn.addEventListener('click', async function () {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (!email || !password) {
          document.getElementById('fail-text').textContent = 'Please fill in all fields.';
          failBox.classList.remove('hidden');
          return;
        }

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Logging in...';

        const formData = new FormData();
        formData.append('email', email);
        formData.append('password', password);

        try {
          const response = await fetch('/admin/login', {
            method: 'POST',
            body: formData
          });

          const data = await response.json();
          if (data.success) {
            sessionStorage.setItem('isLoggedIn', 'true');
            sessionStorage.setItem('userEmail', email);
            window.location.href = data.redirectUrl || '/dashboard';
          } else {
            document.getElementById('fail-text').textContent = data.message || 'Invalid credentials';
            failBox.classList.remove('hidden');
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i> Login to Dashboard';
          }
        } catch (error) {
          document.getElementById('fail-text').textContent = 'Login failed. Please try again.';
          failBox.classList.remove('hidden');
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i> Login to Dashboard';
        }
      });
    });
  </script>
</body>

</html>
